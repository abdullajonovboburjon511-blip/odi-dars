<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacBook Pro Quick View</title>
  <link rel="stylesheet" href="/css.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="product-popup">
    
    <button class="close-btn">&#x2715;</button>

    <div class="product-gallery">
      <div class="main-image">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=600&auto=format&fit=crop&q=60" alt="MacBook Pro">
      </div>
      
      <div class="thumbnails">
        <button class="arrow-btn">&lt;</button>
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=100&auto=format&fit=crop&q=60" class="active">
        <img src="https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=100&auto=format&fit=crop&q=60">
        <img src="https://images.unsplash.com/photo-1541807084-5c52b6b3adef?w=100&auto=format&fit=crop&q=60">
        <img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=100&auto=format&fit=crop&q=60">
        <button class="arrow-btn">&gt;</button>
      </div>
    </div>

    <div class="product-details">
      <div class="rating">
        <span class="stars">★★★★★</span>
        <span class="rating-text"><strong>4.7</strong> Star Rating <span class="gray-text">(21,871 User feedback)</span></span>
      </div>

      <h1>2020 Apple MacBook Pro with Apple M1 Chip (13-inch, 8GB RAM, 256GB SSD Storage) - Space Gray</h1>
      
      <div class="meta-info">
        <span class="sku">Sku: <strong>A264671</strong></span>
        <span class="brand">Brand: <strong>Apple</strong></span>
        <span class="availability">Availability: <span class="in-stock">In Stock</span></span>
      </div>

      <div class="price-section">
        <span class="current-price">$1699</span>
        <span class="old-price">$1999.00</span>
        <span class="discount">21% OFF</span>
      </div>

      <hr class="divider">

      <div class="options-grid">
        <div class="option-item">
          <label>Color</label>
          <div class="color-pickers">
            <span class="color-circle space-gray active"></span>
            <span class="color-circle silver"></span>
          </div>
        </div>
        <div class="option-item">
          <label>Size</label>
          <select>
            <option>14-inch Liquid Retina XDR display</option>
          </select>
        </div>
        <div class="option-item">
          <label>Memory</label>
          <select>
            <option>16GB unified memory</option>
          </select>
        </div>
        <div class="option-item">
          <label>Storage</label>
          <select>
            <option>1TB SSD Storage</option>
          </select>
        </div>
      </div>

      <div class="actions-section">
        <div class="quantity-picker">
          <button>-</button>
          <input type="text" value="01">
          <button>+</button>
        </div>
        <button class="add-to-cart-btn">ADD TO CARD 🛒</button>
        <button class="buy-now-btn">BUY NOW</button>
      </div>

    </div>

  </div>

</body>
</html>
